<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0E2A4A"/>
      <stop offset="55%"  stop-color="#0A1E3A"/>
      <stop offset="100%" stop-color="#061528"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(18,55,105,0.6)"/>
      <stop offset="100%" stop-color="rgba(18,55,105,0)"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(14,44,86,0.45)"/>
      <stop offset="100%" stop-color="rgba(14,44,86,0)"/>
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(240,248,255,0.95)"/>
      <stop offset="55%"  stop-color="rgba(215,235,255,0.88)"/>
      <stop offset="100%" stop-color="rgba(190,218,248,0.80)"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(180,215,255,0.16)"/>
      <stop offset="100%" stop-color="rgba(140,190,240,0)"/>
    </radialGradient>
    <radialGradient id="accent" cx="30%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="rgba(91,170,191,0.12)"/>
      <stop offset="100%" stop-color="rgba(91,170,191,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent glow bottom-left -->
  <ellipse cx="200" cy="500" rx="320" ry="200" fill="url(#accent)"/>

  <!-- Stars -->
  <circle cx="80"  cy="60"  r="1.2" fill="rgba(210,235,255,0.70)"/>
  <circle cx="210" cy="35"  r="0.9" fill="rgba(210,235,255,0.55)"/>
  <circle cx="340" cy="80"  r="1.4" fill="rgba(210,235,255,0.65)"/>
  <circle cx="480" cy="28"  r="0.8" fill="rgba(210,235,255,0.50)"/>
  <circle cx="560" cy="70"  r="1.1" fill="rgba(210,235,255,0.60)"/>
  <circle cx="650" cy="42"  r="0.7" fill="rgba(210,235,255,0.45)"/>
  <circle cx="720" cy="90"  r="1.3" fill="rgba(210,235,255,0.70)"/>
  <circle cx="810" cy="25"  r="1.0" fill="rgba(210,235,255,0.55)"/>
  <circle cx="920" cy="68"  r="0.9" fill="rgba(210,235,255,0.50)"/>
  <circle cx="60"  cy="140" r="0.8" fill="rgba(210,235,255,0.40)"/>
  <circle cx="300" cy="160" r="1.1" fill="rgba(210,235,255,0.55)"/>
  <circle cx="500" cy="120" r="0.7" fill="rgba(210,235,255,0.45)"/>
  <circle cx="780" cy="145" r="1.0" fill="rgba(210,235,255,0.50)"/>
  <circle cx="1050" cy="55" r="1.3" fill="rgba(210,235,255,0.65)"/>
  <circle cx="1130" cy="95" r="0.9" fill="rgba(210,235,255,0.50)"/>
  <circle cx="1080" cy="150" r="1.1" fill="rgba(210,235,255,0.55)"/>

  <!-- Moon glow -->
  <circle cx="1050" cy="110" r="90" fill="url(#moonGlow)" opacity="0.5"/>
  <!-- Moon -->
  <circle cx="1050" cy="110" r="38" fill="url(#moon)" opacity="0.28"/>

  <!-- Wave 1 -->
  <path d="M0,420 Q150,400 300,420 Q450,440 600,418 Q750,396 900,416 Q1050,436 1200,415 L1200,630 L0,630 Z" fill="url(#wave1)"/>
  <!-- Wave 2 -->
  <path d="M0,460 Q200,442 400,462 Q600,482 800,456 Q1000,430 1200,455 L1200,630 L0,630 Z" fill="url(#wave2)"/>
  <!-- Wave shimmer line -->
  <path d="M0,418 Q150,400 300,420 Q450,440 600,418 Q750,396 900,416 Q1050,436 1200,415" fill="none" stroke="rgba(100,170,210,0.18)" stroke-width="1.5"/>

  <!-- Card -->
  <rect x="90" y="145" width="680" height="300" rx="24" fill="rgba(255,255,255,0.05)" stroke="rgba(140,195,235,0.22)" stroke-width="1.5"/>

  <!-- Label line -->
  <rect x="128" y="192" width="22" height="1.5" rx="1" fill="#5BAABF"/>
  <text x="158" y="196" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#5BAABF" letter-spacing="3" text-anchor="start">FULL-STACK SOFTWARE ENGINEER</text>

  <!-- Name -->
  <text x="128" y="258" font-family="Georgia,'Playfair Display',serif" font-size="58" font-weight="700" fill="#D6EDF8" letter-spacing="-1">Bhavatarini</text>
  <text x="128" y="322" font-family="Georgia,'Playfair Display',serif" font-size="58" font-weight="700" fill="#5BAABF" letter-spacing="-1">Thangaraju</text>

  <!-- Tagline -->
  <text x="128" y="370" font-family="Inter,sans-serif" font-size="16" fill="#5E8EA8" letter-spacing="0.3">Backend · Distributed Systems · Cloud · AI/ML</text>

  <!-- Stats -->
  <text x="128" y="415" font-family="Georgia,serif" font-size="26" font-weight="700" fill="#5BAABF">3+</text>
  <text x="165" y="415" font-family="Inter,sans-serif" font-size="13" fill="#5E8EA8">yrs exp</text>
  <rect x="218" y="400" width="1.5" height="22" fill="rgba(91,170,191,0.30)"/>
  <text x="232" y="415" font-family="Georgia,serif" font-size="26" font-weight="700" fill="#5BAABF">3.9</text>
  <text x="268" y="415" font-family="Inter,sans-serif" font-size="13" fill="#5E8EA8">GPA</text>
  <rect x="318" y="400" width="1.5" height="22" fill="rgba(91,170,191,0.30)"/>
  <text x="332" y="415" font-family="Inter,sans-serif" font-size="13" fill="#5E8EA8">📍 Chicago, IL</text>

  <!-- BT monogram bottom-right -->
  <rect x="1068" y="450" width="68" height="68" rx="14" fill="rgba(26,104,130,0.55)" stroke="rgba(91,170,191,0.35)" stroke-width="1.5"/>
  <text x="1102" y="496" font-family="Georgia,serif" font-size="28" font-weight="700" fill="rgba(214,237,248,0.95)" text-anchor="middle">BT</text>
</svg>
